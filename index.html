<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assistant Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .chat-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 20px;
        }

        .animation-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            position: relative;
            margin-bottom: 20px;
        }

        .speaking-ball {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4a89dc, #2c3e50);
            box-shadow: 0 10px 25px rgba(74, 137, 220, 0.5);
            position: relative;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .speaking-ball.talking {
            animation: pulse 0.8s infinite alternate;
        }

        .sound-waves {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .wave {
            position: absolute;
            border: 2px solid #4a89dc;
            border-radius: 50%;
            opacity: 0;
        }

        .wave:nth-child(1) {
            width: 140px;
            height: 140px;
        }

        .wave:nth-child(2) {
            width: 180px;
            height: 180px;
        }

        .wave:nth-child(3) {
            width: 220px;
            height: 220px;
        }

        .wave.active {
            animation: wave 1.5s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(74, 137, 220, 0.5);
            }
            100% {
                transform: scale(1.05);
                box-shadow: 0 15px 35px rgba(74, 137, 220, 0.7);
            }
        }

        @keyframes wave {
            0% {
                transform: scale(0.5);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .chat-window {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #4a89dc;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background-color: #e9ecef;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            flex-direction: column;
        }

        textarea {
            height: 80px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            margin-bottom: 10px;
            font-family: inherit;
        }

        button {
            background-color: #4a89dc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3a70c2;
        }

        .tts-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .tts-controls button {
            flex: 1;
            background-color: #5cb85c;
        }

        .tts-controls button:hover {
            background-color: #4cae4c;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Health Assistant</h1>
            <p>Describe your symptoms and get potential disease predictions</p>
        </header>
        
        <div class="chat-container">
            <div class="animation-container">
                <div class="speaking-ball" id="speakingBall"></div>
                <div class="sound-waves">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
            </div>
            
            <div class="chat-window" id="chatWindow">
                <!-- Chat messages will appear here -->
            </div>
            
            <div class="input-area">
                <textarea id="userInput" placeholder="Describe your symptoms..."></textarea>
                <button id="sendButton">Send</button>
                <div class="tts-controls">
                    <button id="toggleTTS">Toggle TTS</button>
                    <button id="readLast">Read Last Message</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatWindow = document.getElementById('chatWindow');
            const userInput = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const toggleTTS = document.getElementById('toggleTTS');
            const readLast = document.getElementById('readLast');
            const speakingBall = document.getElementById('speakingBall');
            const waves = document.querySelectorAll('.wave');
            
            let ttsEnabled = true;
            let synth = window.speechSynthesis;
            let voices = [];
            let isSpeaking = false;
            let currentSymptoms = "";
            let followUpQueue = [];
            let isAskingFollowUp = false;
            let selectedVoice = null;
            
            // Load voices
            function loadVoices() {
                voices = synth.getVoices();
                console.log("Available voices:", voices.map(v => `${v.name} (${v.lang})`));
                selectedVoice = getBestVoice();
            }
            
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = loadVoices;
            }
            
            loadVoices();
            
            // Add a message to the chat window
            function addMessage(text, isUser) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.classList.add(isUser ? 'user-message' : 'bot-message');
                messageDiv.textContent = text;
                chatWindow.appendChild(messageDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                
                if (!isUser && ttsEnabled) {
                    speak(text);
                }
            }
            
            // Speak text using TTS
            function speak(text) {
                if (!ttsEnabled) return;
                
                // If already speaking, cancel current speech before starting new one
                if (isSpeaking) {
                    synth.cancel();
                }
                
                isSpeaking = true;
                startAnimation();
                
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Use the selected voice
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                
                // Adjust parameters for a more soothing tone
                utterance.rate = 0.9;  // Slightly slower
                utterance.pitch = 1.1; // Slightly higher pitch for female voice
                utterance.volume = 0.9; // Slightly softer
                
                utterance.onend = function() {
                    isSpeaking = false;
                    stopAnimation();
                };
                
                utterance.onerror = function() {
                    isSpeaking = false;
                    stopAnimation();
                };
                
                synth.speak(utterance);
            }
            
            // Get the best soothing female voice
            function getBestVoice() {
                // Prioritized list of female voices (common across platforms)
                const preferredFemaleVoices = [
                    'Google UK English Female',
                    'Microsoft Zira', 
                    'Microsoft Susan',
                    'Microsoft Hazel',
                    'Google US English Female'
                ];                
                // Try to match one of our preferred female voices
                for (const voiceName of preferredFemaleVoices) {
                    const voice = voices.find(v => v.name.includes(voiceName));
                    if (voice) {
                        console.log(`Selected voice: ${voice.name}`);
                        return voice;
                    }
                }
                const femaleKeywords = ['female', 'woman', 'girl', 'sam', 'susan', 'sarah', 'karen', 'lisa'];
                
                for (const keyword of femaleKeywords) {
                    const voice = voices.find(v => v.name.toLowerCase().includes(keyword));
                    if (voice) {
                        console.log(`Found female-like voice: ${voice.name}`);
                        return voice;
                    }
                }
                const potentialFemaleVoice = voices.find(
                    v => (v.lang.includes('en-GB') || v.lang.includes('en-US')) && 
                        !v.name.includes('Male') && 
                        !v.name.includes('Bruce') &&
                        !v.name.includes('David') &&
                        !v.name.includes('Mark')
                );
                
                if (potentialFemaleVoice) {
                    console.log(`Selected potential female voice: ${potentialFemaleVoice.name}`);
                    return potentialFemaleVoice;
                }
                
                // Fallback to any English voice
                const englishVoice = voices.find(v => v.lang.includes('en-'));
                if (englishVoice) {
                    console.log(`Fallback to English voice: ${englishVoice.name}`);
                    return englishVoice;
                }
                
                // Last resort: use the first available voice
                if (voices.length > 0) {
                    console.log(`Last resort voice: ${voices[0].name}`);
                    return voices[0];
                }
                
                console.warn("No voices available");
                return null;
            }
            
            // Animation control
            function startAnimation() {
                speakingBall.classList.add('talking');
                waves.forEach(wave => wave.classList.add('active'));
            }
            
            function stopAnimation() {
                speakingBall.classList.remove('talking');
                waves.forEach(wave => wave.classList.remove('active'));
            }
            
            // Toggle TTS
            toggleTTS.addEventListener('click', function() {
                ttsEnabled = !ttsEnabled;
                toggleTTS.textContent = ttsEnabled ? 'Disable TTS' : 'Enable TTS';
                
                // If disabling TTS while speaking, stop current speech
                if (!ttsEnabled && isSpeaking) {
                    synth.cancel();
                    isSpeaking = false;
                    stopAnimation();
                }
            });
            
            // Read last bot message
            readLast.addEventListener('click', function() {
                const botMessages = document.querySelectorAll('.bot-message');
                if (botMessages.length > 0) {
                    const lastMessage = botMessages[botMessages.length - 1].textContent;
                    speak(lastMessage);
                }
            });
            // Process user input
            async function processUserInput() {
                const text = userInput.value.trim();
                if (!text) return;

                addMessage(text, true);
                userInput.value = '';
                const politeResponses = {
                    "thank you": "You're welcome! Let me know if you have any other symptoms.",
                    "thanks": "You're welcome! Stay healthy!",
                    "bye": "Goodbye! Take care and feel better soon!",
                    "see you": "See you soon! Stay safe and well!"
                };
                const lowerText = text.toLowerCase();
                for (const phrase in politeResponses) {
                    if (lowerText.includes(phrase)) {
                        addMessage(politeResponses[phrase], false);
                        return; // Skip further processing
                    }
                }
                if (isAskingFollowUp) {
                    processFollowUpResponse(text);
                } else {
                    await analyzeSymptoms(text);
                }
            }
            // Process follow-up response
            function processFollowUpResponse(response) {
                const normalizedResponse = response.toLowerCase().trim();
                if (normalizedResponse === 'yes' || normalizedResponse === 'no') {
                    if (normalizedResponse === 'yes') {
                        // Add the symptom to current symptoms
                        const currentQuestion = followUpQueue[0];
                        currentSymptoms += " " + currentQuestion.symptom;
                    } 
                    // Remove the answered question
                    followUpQueue.shift(); 
                    // Ask next question or make prediction
                    if (followUpQueue.length > 0) {
                        askNextFollowUp();
                    } else {
                        isAskingFollowUp = false;
                        makeFinalPrediction();
                    }
                } else {
                    addMessage("Please answer with 'yes' or 'no'.", false);
                    askCurrentFollowUp();
                }
            }
            
            // Ask the current follow-up question
            function askCurrentFollowUp() {
                if (followUpQueue.length > 0) {
                    const currentQuestion = followUpQueue[0];
                    addMessage(`Do you have ${currentQuestion.text}? (yes/no)`, false);
                    // The addMessage function already handles TTS
                }
            }
            
            // Ask the next follow-up question
            function askNextFollowUp() {
                if (followUpQueue.length > 0) {
                    const currentQuestion = followUpQueue[0];
                    addMessage(`Do you have ${currentQuestion.text}? (yes/no)`, false);
                    // The addMessage function already handles TTS
                    userInput.placeholder = "Type 'yes' or 'no'...";
                    isAskingFollowUp = true;
                }
            }
            
            // Show prediction results
            function showPredictionResults(data) {
                let response = `I identified these symptoms: ${data.matched_symptoms.join(', ')}\n\n`;
                response += "Based on your symptoms, you might have:\n";
                
                data.diseases.forEach((disease, index) => {
                    const probability = (data.probabilities[index] * 100).toFixed(1);
                    response += `\n${index + 1}. ${disease} (${probability}% probability)`;
                });
                
                response += `\n\nRecommended treatment for ${data.diseases[0]}:\n${data.treatment}`;
                
                addMessage(response, false);
                // The addMessage function already handles TTS
                
                // Reset for next interaction
                userInput.placeholder = "Describe your symptoms...";
                currentSymptoms = "";
                followUpQueue = [];
                isAskingFollowUp = false;
            }
            
            // Analyze symptoms with the backend
            async function analyzeSymptoms(text) {
                try {
                    const analyzingMessage = "Analyzing your symptoms...";
                    addMessage(analyzingMessage, false);
                    
                    const response = await fetch('http://localhost:5000/predict', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            symptoms: text,
                            current_symptoms: currentSymptoms 
                        }),
                    });
                    
                    const data = await response.json();
                    
                    // Remove "Analyzing..." message, but make sure TTS finishes first
                    if (isSpeaking) {
                        synth.cancel(); // Cancel the current TTS
                        isSpeaking = false;
                        stopAnimation();
                    }
                    chatWindow.removeChild(chatWindow.lastChild);
                    
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    
                    // Update current symptoms
                    currentSymptoms = data.current_symptoms;
                    
                    // Handle follow-up questions
                    if (data.follow_up_questions && data.follow_up_questions.length > 0) {
                        followUpQueue = data.follow_up_questions.map(s => ({
                            text: s,
                            symptom: s.replace(" ", "_")
                        }));
                        askNextFollowUp();
                    } else {
                        showPredictionResults(data);
                    }
                    
                } catch (error) {
                    console.error('Error:', error);
                    // Cancel any ongoing TTS
                    if (isSpeaking) {
                        synth.cancel();
                        isSpeaking = false;
                        stopAnimation();
                    }
                    chatWindow.removeChild(chatWindow.lastChild);
                    addMessage("Sorry, I encountered an error processing your request. Please try again.", false);
                }
            }
            
            // Make final prediction after follow-ups
            async function makeFinalPrediction() {
                try {
                    const analyzingMessage = "Analyzing your symptoms...";
                    addMessage(analyzingMessage, false);
                    
                    const response = await fetch('http://localhost:5000/predict', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            symptoms: "",
                            current_symptoms: currentSymptoms 
                        }),
                    });
                    
                    const data = await response.json();
                    
                    // Remove "Analyzing..." message but make sure TTS finishes first
                    if (isSpeaking) {
                        synth.cancel(); // Cancel the current TTS
                        isSpeaking = false;
                        stopAnimation();
                    }
                    chatWindow.removeChild(chatWindow.lastChild);
                    
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    
                    showPredictionResults(data);
                    
                } catch (error) {
                    console.error('Error:', error);
                    // Cancel any ongoing TTS
                    if (isSpeaking) {
                        synth.cancel();
                        isSpeaking = false;
                        stopAnimation();
                    }
                    chatWindow.removeChild(chatWindow.lastChild);
                    addMessage("Sorry, I encountered an error processing your request. Please try again.", false);
                }
            }
            
            // Event listeners
            sendButton.addEventListener('click', processUserInput);
            
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    processUserInput();
                }
            });
            
            // Initial bot greeting
            setTimeout(() => {
                addMessage("Hello! I'm your health assistant. Please describe your symptoms and I'll try to identify potential conditions. Remember, I'm not a substitute for professional medical advice.", false);
            }, 500);
        });
    </script>
</body>
</html>
